<!DOCTYPE html>
<html lang="bn">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iftar With Vai Brother | 2026</title>

  <style>
    :root {
      --bg-dark: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --gold: #fbbf24;
      --emerald: #10b981;
      --text: #f8fafc;
    }

    * {
      box-sizing: border-box;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%);
      background-attachment: fixed;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%;
      padding: 40px 20px;
      text-align: center;
      background: rgba(0, 0, 0, 0.5);
      border-bottom: 2px solid var(--gold);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      animation: fadeInDown 0.8s ease;
    }

    .container {
      max-width: 450px;
      width: 90%;
      margin: 40px 0;
      padding: 30px;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      border: 1px solid rgba(251, 191, 36, 0.2);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      animation: fadeInUp 0.8s ease;
    }

    .info-box {
      background: rgba(15, 23, 42, 0.6);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 1.05rem;
    }

    .fee-badge {
      background: linear-gradient(90deg, #b45309, #d97706);
      color: white;
      padding: 12px;
      border-radius: 10px;
      margin: 20px 0;
      font-weight: bold;
      font-size: 1.1rem;
      box-shadow: 0 4px 15px rgba(217, 119, 6, 0.3);
    }

    #countdown {
      font-size: 1.4rem;
      color: var(--gold);
      margin-bottom: 25px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }

    input {
      width: 100%;
      padding: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: white;
      font-size: 1rem;
    }

    input:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(255, 255, 255, 0.1);
    }

    #paymentSection {
      display: none;
      margin-top: 20px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      border-left: 4px solid var(--emerald);
      animation: slideIn 0.4s ease;
    }

    #paymentSection h4 {
      margin: 0 0 10px 0;
      color: var(--emerald);
    }

    .total-price {
      font-size: 1.8rem;
      color: var(--gold);
      font-weight: bold;
      display: block;
      margin: 10px 0;
    }

    button[type="submit"] {
      width: 100%;
      padding: 16px;
      margin-top: 20px;
      background: var(--emerald);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
    }

    button[type="submit"]:hover {
      background: #059669;
      transform: translateY(-2px);
    }

    footer {
      margin-top: auto;
      padding: 30px;
      opacity: 0.5;
      font-size: 0.9rem;
    }

    /* Animations */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>

<body>

  <header>
    <h1>🌙 Iftar With Vai Brother</h1>
  </header>

  <div class="container">
    <div class="info-box">📅 তারিখ: <b>১২ মার্চ ২০২৬</b></div>
    <div class="info-box">📍 স্থান: <b>সখিপুর, টাঙ্গাইল</b></div>
    
    <div class="fee-badge">রেজিস্ট্রেশন ফি: ১৫০ টাকা (জনপ্রতি)</div>

    <div id="countdown">Loading...</div>

    <form id="registrationForm" action="https://formspree.io/f/xreyeqvq" method="POST">
      <div class="form-group">
        <input type="text" name="Name" placeholder="আপনার নাম" required>
      </div>
      <div class="form-group">
        <input type="tel" name="Phone" placeholder="ফোন নাম্বার" required>
      </div>
      <div class="form-group">
        <input type="number" name="Guests" id="guestCount" placeholder="কতজন আসবেন?" min="1" required>
      </div>

      <div id="paymentSection">
        <h4>💳 পেমেন্ট বিস্তারিত</h4>
        <p>মোট ফি: <span class="total-price" id="totalFee">0 ৳</span></p>
        <p>বিকাশ (Send Money): <b>01306605226</b></p>
        <input type="text" name="TrxID" placeholder="Transaction ID (TrxID)" required style="margin-top:10px;">
      </div>

      <button type="submit" id="submitBtn">রেজিস্ট্রেশন সম্পন্ন করুন</button>
      <div id="statusMessage" style="margin-top: 20px;"></div>
    </form>
  </div>

  <footer>
    Ramadan 2026 | Sakhipur, Tangail
  </footer>

  <script>
    const targetDate = new Date("March 12, 2026 18:10:00").getTime();
    setInterval(() => {
      const now = new Date().getTime();
      const diff = targetDate - now;
      if (diff < 0) {
        document.getElementById("countdown").innerHTML = "ইফতারের সময় হয়ে গেছে!";
        return;
      }
      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((diff % (1000 * 60)) / 1000);
      document.getElementById("countdown").innerHTML = `${d}দিন : ${h}ঘণ্টা : ${m}মিনিট : ${s}সেকেন্ড`;
    }, 1000);

    const guestInput = document.getElementById("guestCount");
    const paymentSection = document.getElementById("paymentSection");
    const totalFeeDisplay = document.getElementById("totalFee");

    guestInput.addEventListener("input", (e) => {
      const guests = parseInt(e.target.value);
      if (guests > 0) {
        totalFeeDisplay.innerText = (guests * 150) + " ৳";
        paymentSection.style.display = "block";
      } else {
        paymentSection.style.display = "none";
      }
    });

    const form = document.getElementById("registrationForm");
    const statusMessage = document.getElementById("statusMessage");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const submitBtn = document.getElementById("submitBtn");
      submitBtn.innerText = "জমা হচ্ছে...";
      submitBtn.disabled = true;
      const data = new FormData(form);
      try {
        const response = await fetch(form.action, {
          method: form.method,
          body: data,
          headers: { 'Accept': 'application/json' }
        });
        if (response.ok) {
          form.reset();
          paymentSection.style.display = "none";
          statusMessage.innerHTML = "<p style='color:#10b981'>✅ রেজিস্ট্রেশন সফল হয়েছে!</p>";
        } else {
          statusMessage.innerHTML = "<p style='color:#ef4444'>❌ ভুল হয়েছে। আবার চেষ্টা করুন।</p>";
        }
      } catch (error) {
        statusMessage.innerHTML = "<p style='color:#ef4444'>❌ নেটওয়ার্ক সমস্যা!</p>";
      }
      submitBtn.innerText = "রেজিস্ট্রেশন সম্পন্ন করুন";
      submitBtn.disabled = false;
    });
  </script>

</body>
</html>
