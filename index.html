<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iftar With Vai Brother | 2026</title>

    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --gold: #fbbf24;
            --emerald: #10b981;
            --text: #f8fafc;
        }

        * {
            box-sizing: border-box;
            transition: .3s;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui;
            background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            animation: pageFade 1s ease;
        }

        @keyframes pageFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* lantern animation */
        .lantern {
            position: fixed;
            top: -120px;
            font-size: 40px;
            animation: floatLantern linear infinite;
            z-index: -1;
        }

        .l1 { left: 10%; animation-duration: 12s; }
        .l2 { left: 35%; animation-duration: 15s; }
        .l3 { left: 65%; animation-duration: 18s; }
        .l4 { left: 85%; animation-duration: 14s; }

        @keyframes floatLantern {
            0% { transform: translateY(-120px) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }

        header {
            width: 100%;
            padding: 40px 20px;
            text-align: center;
            background: rgba(0, 0, 0, .5);
            border-bottom: 2px solid var(--gold);
            animation: slideDown 1s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
            color: var(--gold);
        }

        .container {
            max-width: 450px;
            width: 90%;
            margin: 40px 0;
            padding: 30px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(251, 191, 36, .2);
            animation: cardPop 1.2s ease;
        }

        @keyframes cardPop {
            0% { opacity: 0; transform: scale(.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .info-box {
            background: rgba(15, 23, 42, .6);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .fee-badge {
            background: linear-gradient(90deg, #b45309, #d97706);
            padding: 12px;
            border-radius: 10px;
            margin: 20px 0;
            font-weight: bold;
            text-align: center;
        }

        #countdown {
            font-size: 1.4rem;
            color: var(--gold);
            margin-bottom: 25px;
            font-weight: 800;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
        }

        input:focus {
            border-color: var(--gold);
            background: rgba(255, 255, 255, .1);
        }

        /* --- Payment Section Animation --- */
        #paymentSection {
            display: none; /* JS দিয়ে কন্ট্রোল হবে */
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            border-left: 4px solid var(--emerald);
            
            /* Animation Property */
            animation: slideInUp 0.5s ease forwards;
            overflow: hidden;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
                max-height: 0;
            }
            to {
                opacity: 1;
                transform: translateY(0);
                max-height: 600px; /* পর্যাপ্ত জায়গা */
            }
        }

        .total-price {
            font-size: 1.8rem;
            color: var(--gold);
            font-weight: bold;
            display: block;
            margin: 10px 0;
            text-align: center;
        }

        .bkash-title {
            font-size: 14px;
            opacity: .8;
            margin-bottom: 8px;
            text-align: center;
        }

        .bkash-number-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #022c22, #065f46);
            border: 1px solid #10b981;
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(16, 185, 129, .3);
        }

        .copy-btn {
            cursor: pointer;
            font-size: 18px;
            background: rgba(255, 255, 255, .15);
            padding: 6px 8px;
            border-radius: 6px;
        }

        .copy-btn:active {
            transform: scale(0.9);
        }

        .copy-success {
            color: #22c55e;
            font-size: 13px;
            margin-left: 10px;
            display: none;
        }

        .instruction {
            font-size: 12px;
            opacity: .75;
            margin-top: 15px;
            margin-bottom: 6px;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: var(--emerald);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        button:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        footer {
            margin-top: auto;
            padding: 30px;
            opacity: .5;
            font-size: .9rem;
        }
    </style>
</head>

<body>

    <div class="lantern l1">🏮</div>
    <div class="lantern l2">🏮</div>
    <div class="lantern l3">🏮</div>
    <div class="lantern l4">🏮</div>

    <header>
        <h1>🌙 Iftar With Vai Brother</h1>
    </header>

    <div class="container">

        <div class="info-box">📅 তারিখ: <b>১২ মার্চ ২০২৬</b></div>
        <div class="info-box">📍 স্থান: <b>সখিপুর, টাঙ্গাইল</b></div>

        <div class="fee-badge">
            রেজিস্ট্রেশন ফি: ১৫০ টাকা (জনপ্রতি)
        </div>

        <div id="countdown">Loading...</div>

        <form id="registrationForm" action="https://formspree.io/f/xreyeqvq" method="POST">

            <input type="text" name="Name" placeholder="আপনার নাম" required>

            <input type="tel" name="Phone" placeholder="ফোন নাম্বার" required>

            <input type="number" name="Guests" id="guestCount" placeholder="কতজন আসবেন?" min="1" required>

            <div id="paymentSection">
                <h4>💳 পেমেন্ট বিস্তারিত</h4>
                <p id="feeLabel">মোট ফি:</p>
                <span class="total-price" id="totalFee">0 ৳</span>

                <div class="bkash-title">বিকাশ (Send Money)</div>
                <div class="bkash-number-box">
                    <span id="bkashNumber">01619738397</span>
                    <div>
                        <span class="copy-btn" onclick="copyNumber()">📋</span>
                        <span class="copy-success" id="copySuccess">✔ কপি হয়েছে</span>
                    </div>
                </div>

                <div class="instruction">
                    বিকাশে টাকা পাঠানোর পর Transaction ID টি নিচে দিন
                </div>
                <input type="text" name="TrxID" placeholder="Transaction ID (TrxID)" required>
            </div>

            <button type="submit" id="submitBtn">
                রেজিস্ট্রেশন সম্পন্ন করুন
            </button>

        </form>

    </div>

    <footer>
        Ramadan 2026 | Sakhipur, Tangail
    </footer>

    <script>
        /* countdown */
        const targetDate = new Date("March 12, 2026 18:10:00").getTime();

        setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff < 0) {
                document.getElementById("countdown").innerHTML = "ইফতারের সময় হয়ে গেছে!";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML =
                `${d}দিন : ${h}ঘণ্টা : ${m}মিনিট : ${s}সেকেন্ড`;
        }, 1000);

        /* guest fee logic with animation trigger */
        const guestInput = document.getElementById("guestCount");
        const paymentSection = document.getElementById("paymentSection");
        const totalFeeDisplay = document.getElementById("totalFee");
        const feeLabel = document.getElementById("feeLabel");

        guestInput.addEventListener("input", (e) => {
            const guests = parseInt(e.target.value);

            if (guests > 0) {
                totalFeeDisplay.innerText = (guests * 150) + " ৳";
                feeLabel.innerText = `মোট ফি: (${guests} জনের জন্য)`;
                
                // এনিমেশন সহ শো করা
                paymentSection.style.display = "block";
            } else {
                paymentSection.style.display = "none";
            }
        });

        /* copy number function */
        function copyNumber() {
            const number = document.getElementById("bkashNumber").innerText;
            navigator.clipboard.writeText(number).then(() => {
                const msg = document.getElementById("copySuccess");
                msg.style.display = "inline";
                setTimeout(() => {
                    msg.style.display = "none";
                }, 2000);
            });
        }
    </script>

</body>
</html>
