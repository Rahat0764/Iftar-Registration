<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iftar With Vai Brother</title>

<style>
*{ box-sizing:border-box; }
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}
header{
  padding:40px;
  background:rgba(0,0,0,0.7);
  border-bottom:2px solid gold;
}
header h1{
  color:gold;
  font-size:32px;
  margin: 0;
}
.container{
  max-width:500px;
  margin:30px auto;
  padding:25px;
  background:rgba(255,255,255,0.1);
  border-radius:15px;
}
.info{
  margin:10px 0;
  background:rgba(0,0,0,0.4);
  padding:10px;
  border-radius:8px;
}
.fee-info {
  background: rgba(226, 19, 110, 0.2);
  border: 1px solid #e2136e;
  color: #fff;
  padding: 12px;
  border-radius: 8px;
  margin: 15px 0;
  font-size: 18px;
}
#countdown{
  font-size:22px;
  color:gold;
  margin:20px 0;
  font-weight: bold;
}
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}
button{
  width:100%;
  padding:14px;
  background:#27ae60;
  border:none;
  border-radius:8px;
  color:white;
  font-size:16px;
  cursor:pointer;
  font-weight: bold;
  margin-top: 10px;
}
button:hover{
  background:#2ecc71;
}
#statusMessage {
  margin-top: 15px;
  font-size: 16px;
  line-height: 1.5;
}
.success-msg {
  color: #2ecc71;
  font-weight: bold;
  background: rgba(46, 204, 113, 0.1);
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #2ecc71;
}
.error-msg {
  color: #e74c3c;
  font-weight: bold;
}
/* Payment Section Style */
#paymentSection {
  display: none;
  margin: 15px 0;
  padding: 15px;
  background: rgba(0,0,0,0.5);
  border-radius: 8px;
  text-align: left;
  border-left: 4px solid #e2136e;
}
#paymentSection h4 {
  color: #e2136e;
  margin-top: 0;
  margin-bottom: 10px;
  font-size: 18px;
}
#paymentSection p {
  margin: 5px 0;
  font-size: 15px;
}
.total-amount {
  font-size: 22px;
  color: gold;
  font-weight: bold;
}
footer{
  margin:30px;
  color:#ccc;
}
</style>
</head>

<body>

<header>
  <h1>🌙 Iftar With Vai Brother</h1>
</header>

<div class="container">

  <div class="info">📅 তারিখ: <b>১২ মার্চ ২০২৬</b></div>
  <div class="info">📍 স্থান: <b>সখিপুর, টাঙ্গাইল</b></div>
  
  <div class="fee-info"><b>রেজিস্ট্রেশন ফি: ১৫০ টাকা (জনপ্রতি)</b></div>

  <div id="countdown">Loading...</div>

  <h3>রেজিস্ট্রেশন করুন</h3>

  <form id="registrationForm" action="https://formspree.io/f/xreyeqvq" method="POST">
    
    <input type="text" name="Name" id="userName" placeholder="আপনার নাম" required>
    <input type="tel" name="Phone" id="userPhone" placeholder="আপনার ফোন নাম্বার" required>
    
    <input type="number" name="Guests" id="guestCount" placeholder="কতজন আসবেন? (যেমন: 1, 2)" min="1" required>

    <div id="paymentSection">
      <h4>💳 পেমেন্ট বিস্তারিত</h4>
      <p>আপনার মোট ফি: <span class="total-amount" id="totalFee">0</span> <b>টাকা</b></p>
      <p>বিকাশ (Send Money): <b>01306605226</b></p>
      <p style="font-size: 13px; color: #aaa; margin-bottom: 10px;">উপরের নাম্বারে টাকা পাঠিয়ে নিচের ঘরে TrxID দিন।</p>
      
      <input type="text" name="bKash_TrxID" id="trxId" placeholder="bKash TrxID (যেমন: 9J2K8...)" required>
    </div>

    <button type="submit" id="submitBtn">নাম ও পেমেন্ট জমা দিন</button>
    <div id="statusMessage"></div>
    
  </form>

</div>

<footer>
  Ramadan Kareem 🌙 | 2026
</footer>

<script>
// Countdown Timer
const targetDate = new Date("March 12, 2026 18:10:00").getTime();

setInterval(()=>{
  const now = new Date().getTime();
  const diff = targetDate - now;

  if (diff < 0) {
    document.getElementById("countdown").innerHTML = "ইফতারের সময় হয়ে গেছে!";
    return;
  }

  const d = Math.floor(diff/(1000*60*60*24));
  const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const m = Math.floor((diff%(1000*60*60))/(1000*60));
  const s = Math.floor((diff%(1000*60))/1000);

  document.getElementById("countdown").innerHTML = 
  `⏳ ইফতারের বাকি: ${d}দিন ${h}ঘণ্টা ${m}মিনিট ${s}সেকেন্ড`;
}, 1000);

// Payment Calculation Logic
const guestInput = document.getElementById("guestCount");
const paymentSection = document.getElementById("paymentSection");
const totalFeeDisplay = document.getElementById("totalFee");

guestInput.addEventListener("input", (e) => {
  const guests = parseInt(e.target.value);
  
  if (guests > 0) {
    const totalAmount = guests * 150;
    totalFeeDisplay.innerText = totalAmount;
    paymentSection.style.display = "block";
  } else {
    paymentSection.style.display = "none";
  }
});

// Formspree Submission
const form = document.getElementById("registrationForm");
const submitBtn = document.getElementById("submitBtn");
const statusMessage = document.getElementById("statusMessage");

form.addEventListener("submit", async (e) => {
  e.preventDefault(); 
  
  submitBtn.innerText = "জমা হচ্ছে...";
  submitBtn.disabled = true;

  const data = new FormData(form);

  try {
    const response = await fetch(form.action, {
      method: form.method,
      body: data,
      headers: {
        'Accept': 'application/json'
      }
    });

    if (response.ok) {
      form.reset();
      paymentSection.style.display = "none"; 
      
      statusMessage.className = "success-msg";
      statusMessage.innerHTML = "✅ তথ্য জমা হয়েছে!<br><span style='font-size:14px; font-weight:normal;'>অ্যাডমিন পেমেন্ট চেক করে খুব জলদি আপনার রেজিস্ট্রেশন কনফার্ম করবেন।</span>";
    } else {
      statusMessage.className = "error-msg";
      statusMessage.innerText = "দুঃখিত, কোনো সমস্যা হয়েছে। আবার চেষ্টা করুন।";
    }
  } catch (error) {
    statusMessage.className = "error-msg";
    statusMessage.innerText = "নেটওয়ার্ক সমস্যা। আবার চেষ্টা করুন।";
  }

  submitBtn.innerText = "নাম ও পেমেন্ট জমা দিন";
  submitBtn.disabled = false;
  
  // ১০ সেকেন্ড পর মেসেজ মুছে ফেলা
  setTimeout(() => {
    statusMessage.innerText = "";
    statusMessage.className = "";
  }, 10000);
});
</script>

</body>
</html>
