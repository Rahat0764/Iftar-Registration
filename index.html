<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iftar With Vai Brother | 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --gold: #fbbf24;
            --emerald: #10b981;
            --text: #f8fafc;
        }

        * { box-sizing: border-box; transition: .3s; }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui;
            background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            animation: pageFade 1s ease;
        }

        @keyframes pageFade { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .lantern { position: fixed; top: -120px; font-size: 40px; animation: floatLantern linear infinite; z-index: -1; }
        .l1 { left: 10%; animation-duration: 12s; }
        .l2 { left: 35%; animation-duration: 15s; }
        .l3 { left: 65%; animation-duration: 18s; }
        .l4 { left: 85%; animation-duration: 14s; }

        @keyframes floatLantern { 0% { transform: translateY(-120px) rotate(0deg); } 100% { transform: translateY(110vh) rotate(360deg); } }

        header { width: 100%; padding: 40px 20px; text-align: center; background: rgba(0, 0, 0, .5); border-bottom: 2px solid var(--gold); }
        header h1 { margin: 0; font-size: 2rem; color: var(--gold); }

        .container {
            max-width: 450px; width: 90%; margin: 40px 0; padding: 30px;
            background: var(--card-bg); backdrop-filter: blur(12px);
            border-radius: 20px; border: 1px solid rgba(251,191,36,.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .info-box { background: rgba(15, 23, 42, .6); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .fee-badge { background: linear-gradient(90deg, #b45309, #d97706); padding: 12px; border-radius: 10px; margin: 20px 0; font-weight: bold; text-align: center; }
        #countdown { font-size: 1.3rem; color: var(--gold); margin-bottom: 25px; font-weight: 800; text-align: center; }

        input {
            width: 100%; padding: 14px; background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .1); border-radius: 10px;
            color: white; font-size: 1rem; margin-bottom: 15px; outline: none;
        }

        input:focus { border-color: var(--gold); background: rgba(255, 255, 255, .1); }

        #paymentSection {
            display: none; margin-top: 20px; padding: 20px;
            background: rgba(0, 0, 0, 0.4); border-radius: 12px;
            border-left: 4px solid var(--emerald); animation: slideInUp 0.5s ease forwards;
        }

        @keyframes slideInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .total-price { font-size: 1.8rem; color: var(--gold); font-weight: bold; display: block; margin: 10px 0; text-align: center; }

        .bkash-number-box {
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(135deg, #022c22, #065f46);
            border: 1px solid #10b981; border-radius: 10px; padding: 14px 16px; font-size: 18px; font-weight: bold;
        }

        .copy-btn { cursor: pointer; background: rgba(255, 255, 255, .15); padding: 6px 10px; border-radius: 6px; }

        button {
            width: 100%; padding: 16px; margin-top: 20px; background: var(--emerald);
            border: none; border-radius: 10px; color: white; font-size: 1.1rem;
            font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        button:hover { background: #059669; transform: translateY(-2px); }
        button:disabled { background: #4b5563; cursor: not-allowed; }

        footer { margin-top: auto; padding: 30px; opacity: .5; font-size: .9rem; text-align: center; }
        
        /* SweetAlert Custom Dark Mode */
        .swal2-popup {
            background: #1e293b !important;
            color: #fff !important;
            border-radius: 20px !important;
        }
    </style>
</head>
<body>

    <div class="lantern l1">🏮</div>
    <div class="lantern l2">🏮</div>
    <div class="lantern l3">🏮</div>
    <div class="lantern l4">🏮</div>

    <header>
        <h1>🌙 Iftar With Vai Brother</h1>
    </header>

    <div class="container">
        <div class="info-box">📅 তারিখ: <b>১২ মার্চ ২০২৬</b></div>
        <div class="info-box">📍 স্থান: <b>সখিপুর, টাঙ্গাইল</b></div>
        <div class="fee-badge">রেজিস্ট্রেশন ফি: ১৫০ টাকা (জনপ্রতি)</div>
        <div id="countdown">Loading...</div>

        <form id="registrationForm">
            <input type="text" id="userName" placeholder="আপনার নাম" required>
            <input type="tel" id="userPhone" placeholder="ফোন নাম্বার" required>
            <input type="number" id="guestCount" placeholder="কতজন আসবেন?" min="1" required>

            <div id="paymentSection">
                <h4 style="margin-top:0; color:var(--emerald);">💳 পেমেন্ট বিস্তারিত</h4>
                <p id="feeLabel" style="margin-bottom:5px;">মোট ফি:</p>
                <span class="total-price" id="totalFee">0 ৳</span>

                <div style="text-align:center; font-size:14px; margin-bottom:8px; opacity:0.8;">বিকাশ (Send Money)</div>
                <div class="bkash-number-box">
                    <span id="bkashNumber">01619738397</span>
                    <span class="copy-btn" onclick="copyNumber()">📋</span>
                </div>

                <div style="font-size:12px; margin-top:15px; opacity:0.7;">টাকা পাঠানোর পর TrxID নিচে দিন</div>
                <input type="text" id="trxID" placeholder="TrxID এখানে লিখুন" required>
            </div>

            <button type="submit" id="submitBtn">রেজিস্ট্রেশন সম্পন্ন করুন</button>
        </form>
    </div>

    <footer>Ramadan 2026 | Sakhipur, Tangail</footer>

    <script>
        const TELEGRAM_CHAT_IDS = ['8395284772', '6073457658']; 
        const TELEGRAM_BOT_TOKEN = '8289877335:AAHcXDyb2pu7XjLbMxDM_g1l7EbkQEmVD_Y';

        /* Countdown logic */
        const targetDate = new Date("March 12, 2026 18:10:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if(diff < 0) { document.getElementById("countdown").innerHTML = "ইফতারের সময় হয়ে গেছে!"; return; }
            const d = Math.floor(diff/(1000*60*60*24)), h = Math.floor((diff%(1000*60*60*24))/(1000*60*60)), m = Math.floor((diff%(1000*60*60))/(1000*60)), s = Math.floor((diff%(1000*60))/1000);
            document.getElementById("countdown").innerHTML = `${d} দিন : ${h} ঘণ্টা : ${m} মিনিট : ${s} সেকেন্ড`;
        }, 1000);

        /* Fee Logic */
        const guestInput = document.getElementById("guestCount");
        const paymentSection = document.getElementById("paymentSection");
        guestInput.addEventListener("input", (e) => {
            const guests = parseInt(e.target.value);
            if(guests > 0) {
                document.getElementById("totalFee").innerText = (guests * 150) + " ৳";
                document.getElementById("feeLabel").innerText = `মোট ফি: (${guests} জনের জন্য)`;
                paymentSection.style.display = "block";
            } else { paymentSection.style.display = "none"; }
        });

        /* Registration logic with SweetAlert2 */
        document.getElementById("registrationForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            btn.innerText = "প্রসেস হচ্ছে...";

            const name = document.getElementById("userName").value;
            const phone = document.getElementById("userPhone").value;
            const guests = document.getElementById("guestCount").value;
            const trx = document.getElementById("trxID").value;
            const total = guests * 150;

            const message = `🔔 *নতুন রেজিস্ট্রেশন!*\n👤 *নাম:* ${name}\n📞 *ফোন:* ${phone}\n👥 *অতিথি:* ${guests} জন\n💰 *ফি:* ${total} ৳\n🔑 *TrxID:* \`${trx}\``;

            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            
            try {
                for (const chatId of TELEGRAM_CHAT_IDS) {
                    await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: 'Markdown' })
                    });
                }

                // সুন্দর সাকসেস এনিমেশন
                Swal.fire({
                    title: 'রেজিস্ট্রেশন সফল!',
                    text: 'আপনার তথ্য আমাদের কাছে পৌঁছেছে।',
                    icon: 'success',
                    confirmButtonText: 'ঠিক আছে',
                    confirmButtonColor: '#10b981'
                });

                document.getElementById("registrationForm").reset();
                paymentSection.style.display = "none";
            } catch (error) {
                Swal.fire({ title: 'দুঃখিত!', text: 'নেটওয়ার্ক সমস্যা। আবার চেষ্টা করুন।', icon: 'error' });
            } finally {
                btn.disabled = false;
                btn.innerText = "রেজিস্ট্রেশন সম্পন্ন করুন";
            }
        });

        /* Copy logic with small Toast message */
        function copyNumber() {
            const num = document.getElementById("bkashNumber").innerText;
            navigator.clipboard.writeText(num).then(() => {
                const Toast = Swal.mixin({
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 2000,
                    timerProgressBar: true
                });
                Toast.fire({
                    icon: 'success',
                    title: 'নাম্বার কপি হয়েছে!'
                });
            });
        }
    </script>
</body>
</html>
